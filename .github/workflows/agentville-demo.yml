name: Generate agentville skyline
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  skyline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mitosisdev/agentville@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          output: agentville.svg
          commit: 'true'
